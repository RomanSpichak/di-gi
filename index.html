<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&display=swap" rel="stylesheet">
  <title>di-gi</title>
</head>
<body>

<!--  HEADER  -->
  <header class="header">
    <div class="header--container">
      <div class="header--logo">
        <img src="images/header-logo.png" alt="logo">
      </div>
      <div class="header--menu">
        <img src="images/header-menu-button.png" alt="menu">
      </div>
    </div>
  </header>

  <main class="main">
<!--  INTRO  -->
    <section class="intro">
      <div class="intro__container">
        <div class="intro__center-block">
          <div class="intro__center-block--title">
            мисли <br>
            ГЛОБАЛЬНО
          </div>
          <div class="intro__center-block--text">
            Di Gі — це діджитал агенція повного циклу, спрямована на найкращий
            <br> результат наших клієнтів в маркетингу, продажах та управленні
          </div>
          <div class="intro__center-block--button">
            <button type="button" class="intro__button">
              детальніше
            </button>
          </div>
          <div class="intro__center-block--pagination">
            <img src="/images/pagination.png" alt="pagination" class="intro__pagination">
          </div>
        </div>
      </div>
    </section>

  </main>

<!--  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>-->
<!--  <script src="js/main.js"></script>-->
</body>

</html>
