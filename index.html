<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>DiGi digital agency</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!--  The HEADER block -->
  <header class="header">
    <img src="images/header-logo.png" alt="logo" class="logo-header">
    <img src="images/header-menu-button.png" alt="button" class="button-header">
  </header>

<!--  *** MAIN ***  -->
  <main class="main">

<!--    The INTRO section -->
    <section class="intro">
      <div class="intro__title">
        мисли <br>
        ГЛОБАЛЬНО
      </div>
      <div class="intro__text">
        Di Gі — це діджитал агенція повного циклу, спрямована на найкращий
        <br> результат наших клієнтів в маркетингу, продажах та управленні
      </div>
      <div class="intro__button">
        детальніше
      </div>
      <div class="intro__pagination">
        <img src="images/pagination.png" alt="pagination" class="pagination">
      </div>
      <div class="intro__arrow">
        <img src="images/arrows.png" alt="arrow" class="arrow">
      </div>
    </section>

    <section class="promo">PROMO</section>
    <section class="services">SERVICES</section>
    <section class="recent-work">RECENT WORK</section>
    <section class="video-block">VIDEO BLOCK</section>
    <section class="latest-news">LATEST NEWS</section>
    <section class="testimonial">TESTIMONIAL</section>
  </main>
  <footer class="footer">FOOTER</footer>

<!--  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>-->
<!--  <script src="js/main.js"></script>-->
</body>

</html>
