<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/intro.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&display=swap" rel="stylesheet">
  <title>di-gi</title>
</head>
<body>

<!--  HEADER -->
  <header class="header">
    <div class="header__container">
      <div class="header__logo">
        <img src="/images/header-logo.png" alt="logo" class="header__logo">
      </div>
      <div class="header__menu">
        <button class="menu__button">
          <img src="/images/header-menu-button.png" alt="menu-button" class="header__button">
        </button>
      </div>
    </div>
  </header>

  <main class="main">

<!--    INTRO SECTION -->
    <section class="intro">
      <div class="intro__container">
        <div class="intro__title">
          мисли <br>
          ГЛОБАЛЬНО
        </div>
        <div class="intro__text">
          Di Gі — це діджитал агенція повного циклу, спрямована на найкращий
          <br> результат наших клієнтів в маркетингу, продажах та управленні
        </div>
        <div class="intro__button">
          <button class="intro__read-more">
            детальніше
          </button>
        </div>
        <div class="intro__pagination">
          <img src="/images/pagination.png" alt="pagination" class="intro__pagination-img">
        </div>
        <div class="intro__arrows">
          <div class="intro__arrows--left">
            <button class="left__arrow">
              <img src="/images/left-arrow.png" alt="arrow-left" class="intro__arrows--left">
            </button>
          </div>
          <div class="intro__arrows--right">
            <button class="right__arrow">
              <img src="/images/right-arrow.png" alt="arrow-right" class="intro__arrows--right">
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

<!--  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>-->
<!--  <script src="js/main.js"></script>-->
</body>

</html>
